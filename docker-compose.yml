services:
  # https://hub.docker.com/r/mvance/unbound
  unbound:
    container_name: unbound
    hostname: unbound
    image: mvance/unbound:1.21.1
    networks:
      proxy:
        ipv4_address: ${UNBOUND_BRIDGE_IP}
    volumes:
      - unbound-data:/opt/unbound/etc/unbound
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - SYS_TIME
    ulimits:
      nice:
        soft: -20
        hard: -20
    healthcheck:
      test: ["CMD", "drill", "@127.0.0.1", "google.com"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:2025.11.1
    # For DHCP it is recommended to remove these ports and instead add: network_mode: "host"
    ports:
      - 53:53/tcp
      - 53:53/udp
      # - 67:67/udp # Only required if you are using Pi-hole as your DHCP server
      - ${PIHOLE_HTTP_PORT}:${PIHOLE_HTTP_PORT}/tcp
    networks:
      macvlan0:
        ipv4_address: ${PIHOLE_BASE_IP}
      proxy:
        ipv4_address: ${PIHOLE_BRIDGE_IP}
    environment:
      TZ: America/New_York
      FTLCONF_dns_localIPv4: ${PIHOLE_BASE_IP}
      FTLCONF_dns_upstreams: ${UNBOUND_BRIDGE_IP}
      FTLCONF_dns_domain_required: true
      FTLCONF_dns_domain: ${LOCAL_DOMAIN}
      FTLCONF_dns_localHostsDomain: ${LOCAL_DOMAIN}
      FTLCONF_dns_reply_host_IPv4: ${PIHOLE_BASE_IP}
      FTLCONF_webserver_domain: pihole.${LOCAL_DOMAIN}
      FTLCONF_webserver_port: ${PIHOLE_HTTP_PORT}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dns_ipv6: false
      FTLCONF_webserver_interface: "0.0.0.0"
      FTLCONF_dhcp_active: false
      FTLCONF_dns_hosts: |
        192.168.0.9 pinpointer.maliam.local
        192.168.0.10 wheeljack.maliam.local
        192.168.0.11 nacelle.maliam.local
        192.168.0.12 camshaft.maliam.local
        192.168.0.14 ironhide.maliam.local
        192.168.0.15 bumblebee.maliam.local
        192.168.0.16 grimlock.maliam.local
        192.168.0.17 unicron.maliam.local
        192.168.0.18 jazz.maliam.local
        192.168.0.19 photon.maliam.local
      FTLCONF_dns_cnameRecords: |
        dns.maliam.local,pinpointer.maliam.local
        portainer.maliam.local,wheeljack.maliam.local
        nas.maliam.local,wheeljack.maliam.local
        media.maliam.local,jazz.maliam.local
        homeassistant.maliam.local,bumblebee.maliam.local
        ha.maliam.local,bumblebee.maliam.local
        home.maliam.local,jazz.maliam.local
        traefik-dashboard.clickermaster.com,jazz.maliam.local
        home.clickermaster.com,jazz.maliam.local
        ha.clickermaster.com,jazz.maliam.local
      FTLCONF_dns_queryLogging: true
      FTLCONF_dns_cache_size: 10000
      FTLCONF_dns_bogus_priv: true
      FTLCONF_dns_listeningMode: "all"
      FTLCONF_webserver_api_temperatureUnit: "F"
      FTLCONF_dns_dnssec: true
      FTLCONF_dns_blocking_enabled: true
    env_file: .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
    # https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    cap_add:
      - NET_ADMIN # Required if you are using Pi-hole as your DHCP server, else not needed
      - SYS_NICE
      - SYS_TIME
    ulimits:
      nice:
        soft: -20
        hard: -20
    restart: unless-stopped
    depends_on:
      unbound:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PIHOLE_HTTP_PORT}/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  macvlan0:
    external: true
  proxy:
    external: true

volumes:
  unbound-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${UNBOUND_DATA_PATH:-./unbound}
