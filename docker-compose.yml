services:
  # https://hub.docker.com/r/mvance/unbound
  unbound:
    container_name: unbound
    hostname: unbound
    image: mvance/unbound:latest
    ports:
      - 53:53/tcp
      - 53:53/udp
    networks:
      mcvlan0:
        ipv4_address: 192.168.0.8
    volumes:
      - unbound-data:/opt/unbound/etc/unbound
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - SYS_TIME
    ulimits:
      nice:
        soft: -20
        hard: -20
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined        

  # More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:latest
    # For DHCP it is recommended to remove these ports and instead add: network_mode: "host"
    ports:
      - 53:53/tcp
      - 53:53/udp
      # - 67:67/udp # Only required if you are using Pi-hole as your DHCP server
      - 80:80/tcp
    networks:
      mcvlan0:
        ipv4_address: 192.168.0.9
    environment:
      TZ: America/New_York
      WEBPASSWORD_FILE: pihole_webpasswd
      FTL_LOCAL_IPV4: 192.168.0.9
      WEB_BIND_ADDR: 0.0.0.0
      PIHOLE_DNS_: 192.168.0.8
      DHCP_ACTIVE: false
      PIHOLE_DOMAIN: maliam.local
      DHCP_IPv6: false
      VIRTUAL_HOST: pihole
      IPv6: false
    volumes:
      - pihole-config:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
      - /etc/localtime:/etc/localtime:ro
    secrets:
      - pihole_webpasswd
    # https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    cap_add:
      - NET_ADMIN # Required if you are using Pi-hole as your DHCP server, else not needed
      - SYS_NICE
    ulimits:
      nice:
        soft: -20
        hard: -20
    restart: unless-stopped
    depends_on:
      - unbound

networks:
  mcvlan0:
    external: true

secrets:
  pihole_webpasswd:
    file: /opt/stacks/unhole/.secrets/webpassword.txt

volumes:
  unbound-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stacks/unhole/unbound
  pihole-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stacks/unhole/pihole/config
  pihole-dnsmasq:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stacks/unhole/pihole/dnsmasq.d
