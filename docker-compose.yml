services:
  # https://hub.docker.com/r/mvance/unbound
  unbound:
    container_name: unbound
    hostname: unbound
    image: mvance/unbound:1.21.1
    networks:
      dns_net:
        ipv4_address: ${UNBOUND_BRIDGE_IP}
    ports:
      - 5353:53/tcp
      - 5353:53/udp
    volumes:
      - unbound-data:/opt/unbound/etc/unbound
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - SYS_TIME
    ulimits:
      nice:
        soft: -20
        hard: -20
    # healthcheck:
    #   test: ["CMD", "drill", "@127.0.0.1:5353", "google.com"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s

  # More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:2025.11.1
    # For DHCP it is recommended to remove these ports and instead add: network_mode: "host"
    ports:
      - 53:53/tcp
      - 53:53/udp
      # - 67:67/udp # Only required if you are using Pi-hole as your DHCP server
      - ${PIHOLE_HTTP_PORT}:${PIHOLE_HTTP_PORT}/tcp
    networks:
      dns_net:
        ipv4_address: ${PIHOLE_BRIDGE_IP}
      proxy:
    environment:
      TZ: America/New_York
      FTLCONF_dns_upstreams: ${UNBOUND_BRIDGE_IP}#5353
      FTLCONF_dns_domainNeeded: true
      FTLCONF_dns_domain_local: true
      FTLCONF_dns_domain_name: ${LOCAL_DOMAIN}
      FTLCONF_dns_reply_host_IPv4: ${PIHOLE_BASE_IP}
      FTLCONF_webserver_domain: pihole.${LOCAL_DOMAIN}
      FTLCONF_webserver_port: "0.0.0.0:${PIHOLE_HTTP_PORT}"
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dhcp_active: false
      FTLCONF_dns_hosts: |
        192.168.0.9 jazz.maliam.net
        192.168.0.10 wheeljack.maliam.net
        192.168.0.11 nacelle.maliam.net
        192.168.0.12 camshaft.maliam.net
        192.168.0.13 photon.maliam.net
        192.168.0.14 ironhide.maliam.net
        192.168.0.15 bumblebee.maliam.net
        192.168.0.16 grimlock.maliam.net
        192.168.0.17 unicron.maliam.net
      FTLCONF_dns_cnameRecords: |
        dns.maliam.net,jazz.maliam.net
        nas.maliam.net,wheeljack.maliam.net
        traefik-dashboard.maliam.net,jazz.maliam.net
        home.maliam.net,jazz.maliam.net
        pihole.maliam.net,jazz.maliam.net
        media.maliam.net,jazz.maliam.net
        homeassistant.maliam.net,bumblebee.maliam.net
        ha.maliam.net,jazz.maliam.net
      FTLCONF_dns_queryLogging: true
      FTLCONF_dns_cache_size: 10000
      FTLCONF_dns_bogusPriv: false
      FTLCONF_dns_listeningMode: "all"
      FTLCONF_webserver_api_temp_unit: "F"
      FTLCONF_dns_dnssec: true
      FTLCONF_dns_blocking_active: true
    env_file: .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
    # https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    cap_add:
      # - NET_ADMIN # Required if you are using Pi-hole as your DHCP server, else not needed
      - SYS_NICE
      - SYS_TIME
    ulimits:
      nice:
        soft: -20
        hard: -20
    restart: unless-stopped
    depends_on:
      unbound:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PIHOLE_HTTP_PORT}/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.pihole.entrypoints=http"
      - "traefik.http.routers.pihole.rule=Host(`pihole.${LOCAL_DOMAIN}`)"
      - "traefik.http.middlewares.pihole-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.pihole.middlewares=pihole-https-redirect"
      - "traefik.http.routers.pihole-secure.entrypoints=https"
      - "traefik.http.routers.pihole-secure.rule=Host(`pihole.${LOCAL_DOMAIN}`)"
      - "traefik.http.routers.pihole-secure.tls=true"
      - "traefik.http.routers.pihole-secure.service=pihole"
      - "traefik.http.services.pihole.loadbalancer.server.port=${PIHOLE_HTTP_PORT}"

networks:
  dns_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${DNS_NET_SUBNET}
  proxy:
    external: true

volumes:
  unbound-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${UNBOUND_DATA_PATH:-./unbound}
