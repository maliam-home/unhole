services:
  # https://hub.docker.com/r/mvance/unbound
  unbound:
    container_name: unbound
    hostname: unbound
    image: mvance/unbound:latest
    ports:
      - 53:53/tcp
      - 53:53/udp
    networks:
      proxy:
        ipv4_address: ${UNBOUND_BRIDGE_IP}
    volumes:
      - unbound-data:/opt/unbound/etc/unbound
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - SYS_TIME
    ulimits:
      nice:
        soft: -20
        hard: -20

  # More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:latest
    # For DHCP it is recommended to remove these ports and instead add: network_mode: "host"
    ports:
      - 53:53/tcp
      - 53:53/udp
      # - 67:67/udp # Only required if you are using Pi-hole as your DHCP server
      - 8080:8080/tcp
    networks:
      mcvlan0:
        ipv4_address: ${PIHOLE_BASE_IP}
      proxy:
        ipv4_address: ${PIHOLE_BRIDGE_IP}
    environment:
      TZ: America/New_York
      FTLCONF_dns_localIPv4: ${PIHOLE_BASE_IP}
      FTLCONF_dns_upstreams: ${UNBOUND_BRIDGE_IP}
      FTLCONF_dns_domain_required: true
      FTLCONF_dns_domain: ${LOCAL_DOMAIN}
      FTLCONF_dns_localHostsDomain: ${LOCAL_DOMAIN}
      FTLCONF_dns_reply_host_IPv4: ${PIHOLE_BASE_IP}
      FTLCONF_webserver_domain: pihole.${LOCAL_DOMAIN}
      FTLCONF_webserver_port: 8080
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dns_ipv6: false
      FTLCONF_webserver_interface: "0.0.0.0"
      FTLCONF_dhcp_active: false
      FTLCONF_dns_hosts: ${LOCAL_HOSTS}
      FTLCONF_dns_cnameRecords: ${LOCAL_CNAMES}
      FTLCONF_dns_queryLogging: true
      FTLCONF_dns_cache_size: 10000
      FTLCONF_dns_bogus_priv: true
      FTLCONF_dns_listeningMode: "all"
      FTLCONF_webserver_api_temperatureUnit: "F"
      FTLCONF_dns_dnssec: true
      FTLCONF_dns_blocking_enabled: true
      # FTLCONF_dns_revServer_active: true
      # FTLCONF_dns_revServer_network: "192.168.0.0/24"
      # FTLCONF_dns_revServer_target: "192.168.0.1"
      # FTLCONF_dns_revServer_domain: ${LOCAL_DOMAIN}
    env_file: .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
    # https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    cap_add:
      - NET_ADMIN # Required if you are using Pi-hole as your DHCP server, else not needed
      - SYS_NICE
      - SYS_TIME
    ulimits:
      nice:
        soft: -20
        hard: -20
    restart: unless-stopped
    depends_on:
      - unbound

networks:
  mcvlan0:
    external: true
  proxy:
    external: true

volumes:
  unbound-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stacks/unhole/unbound
